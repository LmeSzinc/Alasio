Main:

Campaign:
  args:
    Name:
      dt: secondary-select
      value: 12-4
      option:
        chapter1: [ 1-1, 1-2, 1-3, 1-4 ]
        chapter2: [ 2-1, 2-2, 2-3, 2-4 ]
        chapter3: [ 3-1, 3-2, 3-3, 3-4 ]
        chapter4: [ 4-1, 4-2, 4-3, 4-4 ]
        chapter5: [ 5-1, 5-2, 5-3, 5-4 ]
        chapter6: [ 6-1, 6-2, 6-3, 6-4 ]
        chapter7: [ 7-1, 7-2, 7-3, 7-4 ]
        chapter8: [ 8-1, 8-2, 8-3, 8-4 ]
        chapter9: [ 9-1, 9-2, 9-3, 9-4 ]
        chapter10: [ 10-1, 10-2, 10-3, 10-4 ]
        chapter11: [ 11-1, 11-2, 11-3, 11-4 ]
        chapter12: [ 12-1, 12-2, 12-3, 12-4 ]
        chapter13: [ 13-1, 13-2, 13-3, 13-4 ]
        chapter14: [ 14-1, 14-2, 14-3, 14-4 ]
        chapter15: [ 15-1, 15-2, 15-3, 15-4 ]
    Event:
      value: campaign_main
      option: [ campaign_main ]
    Mode:
      value: normal
      option: [ normal, hard ]
    UseClearMode: true
    UseFleetLock: true
    UseAutoSearch: true
    Use2xBook: false
    AmbushEvade: true

CampaignHard:
  parent: Campaign
  args:
    Event:
      dt: static
      value: campaign_main
    Mode:
      dt: static
      value: normal

StopCondition:
  args:
    OilLimit: 1000
    RunCount: 0
    MapAchievement:
      value: non_stop
      option: [ non_stop, 100_percent_clear, map_3_stars, threat_safe, threat_safe_without_3_stars ]
    StageIncrease: false
    GetNewShip: false
    ReachLevel: 0

Fleet:
  args:
    Fleet:
      value: 1
      option: [ 1, 2, 3, 4, 5, 6 ]
    Formation:
      value: double_line
      option: [ line_ahead, double_line, diamond ]
    FleetMode:
      value: combat_auto
      option: [ combat_auto, combat_manual, stand_still_in_the_middle, hide_in_bottom_left ]
    FleetStep:
      value: 3
      option: [ 2, 3, 4, 5 ]

Submarine:
  args:
    Fleet:
      value: 0
      option: [ 0, 1, 2 ]
    Mode:
      value: do_not_use
      option: [ do_not_use, hunt_only, boss_only, hunt_and_boss, every_combat ]
    AutoSearchMode:
      value: sub_standby
      option: [ sub_standby, sub_auto_call ]
    DistanceToBoss:
      value: '2_grid_to_boss'
      option: [ to_boss_position, 1_grid_to_boss, 2_grid_to_boss, use_open_ocean_support ]

Emotion:
  args:
    Mode:
      value: calculate
      option: [ calculate, ignore, calculate_ignore ]

EmotionRecord:
  parent: DashboardAmount
  args:
    Value:
      value: 119
      range: 0~150
    Control:
      value: prevent_yellow_face
      option: [ keep_exp_bonus, prevent_green_face, prevent_yellow_face, prevent_red_face ]
    Recover:
      value: not_in_dormitory
      option: [ not_in_dormitory, dormitory_floor_1, dormitory_floor_2 ]
    Oath: false

HpControl:
  args:
    UseHpBalance: false
    UseEmergencyRepair: false
    UseLowHpRetreat: false
    HpBalanceThreshold: 0.2
    HpBalanceWeight: 1000, 1000, 1000
    RepairUseSingleThreshold: 0.3
    RepairUseMultiThreshold: 0.6
    LowHpRetreatThreshold: 0.3

EnemyPriority:
  args:
    EnemyScaleBalanceWeight:
      value: default_mode
      option: [ default_mode, S3_enemy_first, S1_enemy_first ]

GemsFarming:
  args:
    ChangeFlagship:
      value: ship
      option: [ ship, ship_equip ]
    CommonCV:
      value: any
      option: [ any, langley, bogue, ranger, hermes ]
    ChangeVanguard:
      value: ship
      option: [ disabled, ship, ship_equip ]
    CommonDD:
      value: any
      option: [ any, favourite, aulick_or_foote , cassin_or_downes, z20_or_z21 ]
    CommissionLimit: true
